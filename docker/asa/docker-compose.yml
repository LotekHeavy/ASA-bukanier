# AKR SURIVAL ASCENDED
#
# MODS:
# 1214404 Cybers Pull it                    https://www.curseforge.com/ark-survival-ascended/mods/cyberspullit
#  948965 Simple Trade                      https://www.curseforge.com/ark-survival-ascended/mods/simple_trade
#  928548 Shiny                             https://www.curseforge.com/ark-survival-ascended/mods/shiny-ascended
#  928501 Solo Farm Mod                     https://www.curseforge.com/ark-survival-ascended/mods/solo-farm-mod
#  935408 Dino Finder                       https://www.curseforge.com/ark-survival-ascended/mods/der-dino-finder
#  937154 Gnome's Early Tek Binoculars      https://www.curseforge.com/ark-survival-ascended/mods/gnomes-early-tek-binoculars
#  932975 Crazy's Crazy Ascended Potions    https://www.curseforge.com/ark-survival-ascended/mods/crazys-crazy-ascended-potions
# 1304113 Adjustable CryoCooldown           https://legacy.curseforge.com/ark-survival-ascended/mods/adjustable-cryocooldown
#  959521 Breeding Stopper                  https://www.curseforge.com/ark-survival-ascended/mods/breeding-stopper
#  930381 Silent Structures                 https://www.curseforge.com/ark-survival-ascended/mods/silent-structures/comments
#  928661 Element And Tribute Transfers     https://www.curseforge.com/ark-survival-ascended/mods/open-source-element-and-tribute-transfers
#
# PVE
# 1058720 Massive Base Protection           https://www.curseforge.com/ark-survival-ascended/mods/klowmassive-test-project
#
# PVP
# 1020675 Hyper's Offline Raid Protection   https://www.curseforge.com/ark-survival-ascended/mods/hypers-offline-raid-protection 
# 1163881 Better Horde Mode (Extinction)    https://www.curseforge.com/ark-survival-ascended/mods/better-horde-mode-qol-open-source
#
# EVENT (asa-server-5)
# 927084 Love Ascended                      https://www.curseforge.com/ark-survival-ascended/mods/love-evolved
# 927090 Winter Wonderland                  https://www.curseforge.com/ark-survival-ascended/mods/winter-wonderland
# 877752 Fear Ascended                      https://www.curseforge.com/ark-survival-ascended/mods/fear-ascended
# 927091 Summer Bash                        https://www.curseforge.com/ark-survival-ascended/mods/summer-bash
# 927083 Turkey Trial                       https://www.curseforge.com/ark-survival-ascended/mods/turkey-trial
#
services:
  # ############################################################
  # Test TEST
  asa-server-0:
    container_name: asa-server-0
    cpus: 4.0
    restart: "no"
    stop_grace_period: 3m
    hostname: asa-server-0
    entrypoint: "/usr/bin/start_server"
    user: gameserver
    image: "mschnitzer/asa-linux-server:latest"
    profiles: [all, test, testgroup]
    tty: true
    environment:
      - ASA_START_PARAMS=TheIsland_WP?listen?Port=7700?RCONPort=27000?RCONEnabled=True -WinLiveMaxPlayers=40 -GBUsageToForceRestart=40 -culture=en -clusterid=bukanier -ClusterDirOverride="/home/gameserver/cluster-shared" -NoTransferFromFiltering -SecureSendArKPayload -structurememopts -UseStructureStasisGrid -EnableIdlePlayerKick -servergamelog -servergamelogincludetribelogs -ServerRCONOutputTribeLogs -DoCustomCosmeticValidation -UseDynamicConfig -noundermeshkilling -NoGameAnalytics -UseItemDupeCheck -ForceDupeLog -mods=1058720,1214404,948965,928548,928501,935408,937154,932975,1304113,959521,930381,928661
      - ENABLE_DEBUG=0
    ports:
      - 0.0.0.0:7700:7700/udp
      - 0.0.0.0:27000:27000/tcp
    depends_on: 
      - set-permissions-0
    volumes:
      - /home/ark/docker/asa/start_server-steamfix.sh:/usr/bin/start_server:ro
      - steam-0:/home/gameserver/Steam:rw
      - steamcmd-0:/home/gameserver/steamcmd:rw
      - server-files-0:/home/gameserver/server-files:rw
      - cluster-shared:/home/gameserver/cluster-shared:rw
      - /etc/localtime:/etc/localtime:ro
    networks:
      asa-network:
  set-permissions-0:
    entrypoint: "/bin/bash -c 'chown -R 25000:25000 /steam ; chown -R 25000:25000 /steamcmd ; chown -R 25000:25000 /server-files ; chown -R 25000:25000 /cluster-shared'"
    user: root
    image: "opensuse/leap"
    profiles: [all, test, testgroup]
    volumes:
      - steam-0:/steam:rw
      - steamcmd-0:/steamcmd:rw
      - server-files-0:/server-files:rw
      - cluster-shared:/cluster-shared:rw
  # ############################################################
  # Island HOME
  asa-server-1:
    container_name: asa-server-1
    cpus: 4.0
    stop_grace_period: 3m
    hostname: asa-server-1
    entrypoint: "/usr/bin/start_server"
